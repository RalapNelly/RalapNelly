<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 真心话收集站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 15px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .btn-danger {
      background: #ff4757;
      color: white;
    }
    .btn-danger:hover {
      background: #ff3344;
    }
    input, textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      transition: border-color 0.3s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    .message {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .speech-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .speech-item {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #667eea;
    }
    .speech-item .employee-id {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    .speech-item .speech-text {
      font-size: 15px;
      color: #333;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .speech-item .timestamp {
      font-size: 11px;
      color: #999;
      margin-top: 10px;
      text-align: right;
    }
    .speech-item .delete-btn {
      margin-top: 10px;
      padding: 8px 15px;
      font-size: 13px;
      width: auto;
      flex: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .emoji {
      font-size: 40px;
      text-align: center;
      display: block;
      margin-bottom: 20px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    .count-badge {
      background: #667eea;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 首页 -->
    <div id="page-home" class="page active">
      <span class="emoji">🎯</span>
      <h1>真心话收集站</h1>
      <p class="subtitle">说出你的心里话，我们认真听</p>
      <div class="btn-group">
        <button class="btn-primary" onclick="showPage('employee')">👤 员工入口</button>
        <button class="btn-secondary" onclick="showPage('admin-login')">🔐 管理员</button>
      </div>
    </div>

    <!-- 员工 - 输入工号 -->
    <div id="page-employee-id" class="page">
      <span class="emoji">🆔</span>
      <h1>输入工号</h1>
      <p class="subtitle">请先验证你的身份</p>
      <label>工号</label>
      <input type="text" id="employeeId" placeholder="例如：E12345">
      <button class="btn-primary" style="width: 100%" onclick="goToSpeech()">下一步 →</button>
      <a class="back-link" onclick="showPage('home')">← 返回首页</a>
    </div>

    <!-- 员工 - 输入真心话 -->
    <div id="page-speech" class="page">
      <span class="emoji">💬</span>
      <h1>说出你的真心话</h1>
      <p class="subtitle">工号：<span id="displayEmployeeId"></span></p>
      <div id="submitMessage"></div>
      <label>你的真心话</label>
      <textarea id="speechText" placeholder="在这里写下你想说的话...&#10;吐槽、建议、想法都可以~"></textarea>
      <button class="btn-primary" style="width: 100%" onclick="submitSpeech()">✓ 确定提交</button>
      <a class="back-link" onclick="showPage('employee-id')">← 返回修改工号</a>
    </div>

    <!-- 提交成功 -->
    <div id="page-success" class="page">
      <span class="emoji">✅</span>
      <h1>提交成功！</h1>
      <p class="subtitle">感谢你的真心话</p>
      <div class="message success">
        你的反馈已收到，我们会认真对待每一条建议！
      </div>
      <button class="btn-primary" style="width: 100%" onclick="showPage('home')">返回首页</button>
    </div>

    <!-- 管理员登录 -->
    <div id="page-admin-login" class="page">
      <span class="emoji">🔐</span>
      <h1>管理员登录</h1>
      <p class="subtitle">查看员工真心话</p>
      <div id="loginMessage"></div>
      <label>管理员 ID</label>
      <input type="text" id="adminId" placeholder="输入管理员 ID">
      <label>密码</label>
      <input type="password" id="adminPassword" placeholder="输入密码">
      <button class="btn-primary" style="width: 100%" onclick="adminLogin()">登录</button>
      <a class="back-link" onclick="showPage('home')">← 返回首页</a>
    </div>

    <!-- 管理员 - 查看列表 -->
    <div id="page-admin-dashboard" class="page">
      <span class="emoji">📋</span>
      <h1>真心话列表 <span class="count-badge" id="speechCount">0</span></h1>
      <p class="subtitle">管理员面板</p>
      <div id="dashboardMessage"></div>
      <div class="speech-list" id="speechList">
        <div class="loading">加载中...</div>
      </div>
      <button class="btn-secondary" style="width: 100%; margin-top: 15px;" onclick="loadSpeeches()">🔄 刷新列表</button>
      <a class="back-link" onclick="showPage('home')">← 退出登录</a>
    </div>
  </div>

  <script>
    // 获取 API 基础 URL（自动检测当前域名）
    const API_BASE = window.location.origin + '/api';
    
    let currentEmployeeId = '';

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      
      // 清空消息
      document.querySelectorAll('.message').forEach(m => m.remove());
      document.getElementById('loginMessage').innerHTML = '';
      document.getElementById('submitMessage').innerHTML = '';
      document.getElementById('dashboardMessage').innerHTML = '';
    }

    function goToSpeech() {
      const employeeId = document.getElementById('employeeId').value.trim();
      if (!employeeId) {
        alert('请输入工号！');
        return;
      }
      currentEmployeeId = employeeId;
      document.getElementById('displayEmployeeId').textContent = employeeId;
      document.getElementById('speechText').value = '';
      showPage('speech');
    }

    async function submitSpeech() {
      const speechText = document.getElementById('speechText').value.trim();
      if (!speechText) {
        alert('请输入真心话内容！');
        return;
      }

      try {
        const response = await fetch(API_BASE + '?action=submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            employeeId: currentEmployeeId,
            speech: speechText
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          showPage('success');
        } else {
          document.getElementById('submitMessage').innerHTML = 
            '<div class="message error">' + (result.error || '提交失败') + '</div>';
        }
      } catch (error) {
        document.getElementById('submitMessage').innerHTML = 
          '<div class="message error">提交失败：' + error.message + '</div>';
      }
    }

    async function adminLogin() {
      const adminId = document.getElementById('adminId').value.trim();
      const password = document.getElementById('adminPassword').value;

      try {
        const response = await fetch(API_BASE + '?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminId, password })
        });
        
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('adminId').value = '';
          document.getElementById('adminPassword').value = '';
          showPage('admin-dashboard');
          loadSpeeches();
        } else {
          document.getElementById('loginMessage').innerHTML = 
            '<div class="message error">' + result.message + '</div>';
        }
      } catch (error) {
        document.getElementById('loginMessage').innerHTML = 
          '<div class="message error">登录失败：' + error.message + '</div>';
      }
    }

    async function loadSpeeches() {
      const listEl = document.getElementById('speechList');
      listEl.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(API_BASE + '?action=speeches');
        const result = await response.json();
        
        const speeches = result.speeches || [];
        document.getElementById('speechCount').textContent = speeches.length;
        
        if (speeches.length === 0) {
          listEl.innerHTML = '<div class="loading">暂无真心话~</div>';
          return;
        }
        
        listEl.innerHTML = speeches.map(s => `
          <div class="speech-item">
            <div class="employee-id">👤 工号：${escapeHtml(s.employeeId)}</div>
            <div class="speech-text">${escapeHtml(s.speech)}</div>
            <div class="timestamp">🕐 ${new Date(s.timestamp).toLocaleString('zh-CN')}</div>
            <button class="btn-danger delete-btn" onclick="deleteSpeech('${s.id}')">删除</button>
          </div>
        `).join('');
      } catch (error) {
        listEl.innerHTML = '<div class="message error">加载失败：' + error.message + '</div>';
      }
    }

    async function deleteSpeech(id) {
      if (!confirm('确定要删除这条真心话吗？')) return;

      try {
        const response = await fetch(API_BASE + '?action=delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        
        const result = await response.json();
        if (result.success) {
          loadSpeeches();
        }
      } catch (error) {
        alert('删除失败：' + error.message);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
